<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Inventario</title>
    <link rel="stylesheet" href="/public/style.css">
</head>
<body>

    <!-- Contenedor principal de la página de login -->
    <div class="container">
        <div class="card">
            <h1 class="title">Iniciar Sesión</h1>
            <p class="subtitle">Ingresa tus credenciales para acceder</p>

            <!-- Formulario de inicio de sesión -->
            <form id="loginForm">

                <!-- Campo de usuario -->
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Ingresa tu usuario"
                        required
                    />
                </div>

                <!-- Campo de contraseña -->
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Ingresa tu contraseña"
                        required
                    />
                </div>

                <!-- Botón de envío -->
                <button type="submit" class="btn btn-primary">Ingresar</button>

            </form>

            <!-- Mensaje de respuesta del servidor -->
            <div id="mensaje" class="mensaje hidden"></div>

            <!-- Enlace a la página de registro -->
            <p class="link-text">¿No tienes cuenta? <a href="/register">Regístrate aquí</a></p>
        </div>
    </div>

    <!-- Script del cliente para manejar el formulario -->
    <script src="/public/login.js"></script>
</body>
</html>
