<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Inventario</title>
    <link rel="stylesheet" href="/public/style.css">
</head>
<body>

    <!-- Contenedor principal de la página de registro -->
    <div class="container">
        <div class="card">
            <h1 class="title">Registro</h1>
            <p class="subtitle">Crea una cuenta para acceder al sistema</p>

            <!-- Formulario de registro -->
            <form id="registerForm">

                <!-- Campo de usuario -->
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Elige un nombre de usuario"
                        required
                    />
                </div>

                <!-- Campo de contraseña -->
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Crea una contraseña segura"
                        required
                    />
                </div>

                <!-- Botón de envío -->
                <button type="submit" class="btn btn-primary">Registrarse</button>

            </form>

            <!-- Mensaje de respuesta del servidor -->
            <div id="mensaje" class="mensaje hidden"></div>

            <!-- Enlace a la página de login -->
            <p class="link-text">¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
        </div>
    </div>

    <!-- Script del cliente para manejar el formulario -->
    <script src="/public/register.js"></script>
</body>
</html>
